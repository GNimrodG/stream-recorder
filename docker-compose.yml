services:
  stream-recorder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stream-recorder
    restart: unless-stopped
    # Required for GPU passthrough with docker compose (non-swarm mode)
    runtime: nvidia
    ports:
      - "3000:3000"
    volumes:
      # Persist recordings data
      - ./recordings:/app/recordings
      # Persist database
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - RECORDINGS_DB_PATH=/app/data/recordings.json
      - RECORDINGS_OUTPUT_DIR=/app/recordings
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - AUTH_AUTHENTIK_CLIENT_SECRET=your_secret_key_here
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

